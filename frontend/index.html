<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Claim Checker</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="shell">
      <h1>Health Claim Checker</h1>
      <p class="sub" id="modelSubtext">Loading model details...</p>

      <div class="examples-section">
        <p class="examples-label">Try an example</p>
        <div id="exampleChips" class="examples-grid"></div>
      </div>

      <label for="claim">Health claim</label>
      <textarea id="claim" rows="3" placeholder="e.g. Vaccines cause autism"></textarea>

      <label for="articleText">Article text <span class="required">(required — paste the article body here)</span></label>
      <textarea id="articleText" rows="8" placeholder="Paste the full article text here..."></textarea>

      <button id="predictBtn">Predict</button>

      <section id="result" class="card hidden">
        <p><strong>Label:</strong> <span id="label"></span></p>
        <p><strong>Confidence:</strong> <span id="confidence"></span></p>
        <p><strong>Misinformation Probability:</strong> <span id="misinfoProb"></span></p>
        <p><strong>Explanation:</strong> <span id="explanation"></span></p>
      </section>

      <p id="error" class="error hidden"></p>
    </main>

    <script src="/frontend/script.js"></script>
  </body>
</html>
